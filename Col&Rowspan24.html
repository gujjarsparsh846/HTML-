<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Col & Row Span</title>
</head>
<body>  
    <table border = "15">
        <caption>
            food menu
        </caption>
        <tr>
            <th rowspan="2">Items</th>
            <th colspan="2">Price</th>
        </tr>
        <tr>
            <th>INR</th>
            <th>USD</th>
        </tr>
        <tr>
            <td>Frooti</td>
            <td>10</td>
            <td>0.12</td>
        </tr>
        <tr>
            <td>Samosa</td>
            <td>20</td>
            <td>0.24</td>
        </tr>
        <tr>
            <td>Chips</td>
            <td>30</td>
            <td>0.36</td>
        </tr>
    </table>

</body>
</html>
